         C52 64 118 20 196 72
         C228 94 256 132 256 132
         C256 132 284 94 316 72
         C394 20 460 64 460 152
         C460 228 384 312 256 428Z"/>
    <path
      fill="url(#heartFace)"
      d="M256 428
         C128 312 52 228 52 152
         C52 64 118 20 196 72
         C228 94 256 132 256 132
         C256 132 284 94 316 72
         C394 20 460 64 460 152
         C460 228 384 312 256 428Z"/>
  </g>

  <path
    fill="url(#lobeHL)"
    d="M256 428
       C128 312 52 228 52 152
       C52 64 118 20 196 72
       C228 94 256 132 256 132
       C256 132 284 94 316 72
       C394 20 460 64 460 152
       C460 228 384 312 256 428Z"/>
  <path
    fill="url(#lobeHR)"
    d="M256 428
       C128 312 52 228 52 152
       C52 64 118 20 196 72
       C228 94 256 132 256 132
       C256 132 284 94 316 72
       C394 20 460 64 460 152
       C460 228 384 312 256 428Z"/>

  <path
