<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="200" height="220" role="img" aria-label="Hot air balloon">
  <defs>
    <linearGradient id="envBase" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e598a8"/>
      <stop offset="38%" stop-color="#f4b8c6"/>
      <stop offset="72%" stop-color="#fcd4dc"/>
      <stop offset="100%" stop-color="#ffe8ee"/>
    </linearGradient>
    <linearGradient id="ribL" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d87890" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#d87890" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ribR" x1="0%" y1="0%" x2="100%" y2="80%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.12"/>
    </linearGradient>
    <linearGradient id="basketGrad" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#e890a4"/>
      <stop offset="100%" stop-color="#d07088"/>
    </linearGradient>
    <linearGradient id="neckGrad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#fce0e6"/>
      <stop offset="100%" stop-color="#f5c8d2"/>
    </linearGradient>
    <filter id="balloonShadow" x="-30%" y="-20%" width="160%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="-4" dy="7" stdDeviation="6" flood-color="#b85870" flood-opacity="0.26"/>
    </filter>
  </defs>

  <g filter="url(#balloonShadow)">
    <!-- Envelope silhouette -->
    <path
      fill="url(#envBase)"
      d="M100 18
         C52 18 24 58 24 108
         C24 128 42 142 68 146
         C78 132 88 118 100 108
         C112 118 122 132 132 146
         C158 142 176 128 176 108
         C176 58 148 18 100 18Z"/>

    <!-- Vertical rib shading (left / shadow side) -->
    <path fill="url(#ribL)" d="M100 18 C58 20 32 52 28 95 C26 115 36 132 56 140 C62 128 70 116 78 104 C58 88 48 58 52 32 C60 24 78 18 100 18 Z"/>
    <path fill="url(#ribL)" opacity="0.7" d="M100 18 C72 22 50 48 44 82 C40 102 48 124 68 138 C74 124 82 110 90 98 C74 78 66 48 76 26 C82 20 90 18 100 18 Z"/>

    <!-- Rib dividers -->
    <g fill="none" stroke="#c86880" stroke-opacity="0.22" stroke-width="1.2" stroke-linecap="round">
      <path d="M100 18 Q78 52 72 108 Q70 128 68 146"/>
      <path d="M100 18 Q88 48 84 108 Q82 128 80 142"/>
      <path d="M100 18 Q112 48 116 108 Q118 128 120 142"/>
      <path d="M100 18 Q122 52 128 108 Q130 128 132 146"/>
      <path d="M100 18 Q100 55 100 108 Q100 128 100 146"/>
    </g>

    <!-- Highlight on right lobes -->
    <path fill="url(#ribR)" d="M100 18 C138 22 162 58 168 102 C170 118 162 134 146 142 C138 128 128 112 120 98 C148 82 158 48 148 24 C138 20 118 18 100 18 Z"/>

    <!-- Neck -->
    <path fill="url(#neckGrad)" d="M78 144 L84 158 L116 158 L122 144 Q100 138 78 144 Z"/>

    <!-- Basket -->
    <rect x="82" y="158" width="36" height="28" rx="6" fill="url(#basketGrad)"/>
    <rect x="86" y="162" width="28" height="8" rx="2" fill="#ffffff" fill-opacity="0.2"/>
  </g>
</svg>
